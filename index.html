      apiKey: "SUA_API_KEY",

      appId: "1:000000000000:web:xxxxxxxxxxxxxx"
    };
    var fbDb = null, useFB = false;
    try {
      if (FIREBASE_CONFIG.apiKey !== "SUA_API_KEY") {
        firebase.initializeApp(FIREBASE_CONFIG);
        fbDb = firebase.database();
        useFB = true;
      } else { console.log("Modo localStorage"); }
    } catch (e) { console.log("Fallback:", e.message); }
    window.storage = {
      get: function(key, shared) {
        if (useFB) {
          var k = key.replace(/[:.]/g, "_");
          return fbDb.ref("rooms/" + k).once("value").then(function(snap) {
            var v = snap.val();
            if (v == null) throw new Error("not found");
            return { key: key, value: typeof v === "string" ? v : JSON.stringify(v) };
          });
        }
        return new Promise(function(resolve, reject) {
          var v = localStorage.getItem("fm_" + key);
          if (v == null) return reject(new Error("not found"));
          resolve({ key: key, value: v });
        });
      },
      set: function(key, value, shared) {
        if (useFB) {
          var k = key.replace(/[:.]/g, "_");
          return fbDb.ref("rooms/" + k).set(value).then(function() { return { key: key, value: value }; });
        }
        return new Promise(function(resolve) {
          localStorage.setItem("fm_" + key, value);
          resolve({ key: key, value: value });
        });
      },
      delete: function(key, shared) {
        if (useFB) {
          var k = key.replace(/[:.]/g, "_");
          return fbDb.ref("rooms/" + k).remove().then(function() { return { key: key, deleted: true }; });
        }
        return new Promise(function(resolve) {
          localStorage.removeItem("fm_" + key);
          resolve({ key: key, deleted: true });
        });
      },
      list: function(prefix, shared) {
        if (useFB) {
          return fbDb.ref("rooms").once("value").then(function(snap) {
            var p = prefix.replace(/[:.]/g, "_");
            var keys = [];
            snap.forEach(function(c) { if (c.key.indexOf(p) === 0) keys.push(prefix + c.key.slice(p.length)); });
            return { keys: keys };
          });
        }
        return new Promise(function(resolve) {
          var keys = [];
          var lsPrefix = "fm_" + prefix;
          for (var i = 0; i < localStorage.length; i++) {
            var k = localStorage.key(i);
            if (k.indexOf(lsPrefix) === 0) keys.push(prefix + k.slice(lsPrefix.length));
          }
          resolve({ keys: keys });
        });
      }
    };

// ═══════════════════════════════════════════════════
// STORAGE
// ═══════════════════════════════════════════════════
async function getRoom(rid) {
  try { const r = await window.storage.get(`fm2:${rid}`, true); return r ? JSON.parse(r.value) : null; } catch { return null; }
}
async function setRoom(rid, data) {
  try { data.updatedAt = Date.now(); await window.storage.set(`fm2:${rid}`, JSON.stringify(data), true); } catch (e) { console.error(e); }
}
async function deleteRoom(rid) {
  try {
    // Method 1: window.storage.delete
    await window.storage.delete(`fm2:${rid}`, true);
  } catch (e) { console.log("storage.delete failed:", e); }
  // Method 2: Direct localStorage removal (always try as backup)
  try {
    localStorage.removeItem("fm_fm2:" + rid);
    // Also try without prefix in case storage implementation differs
    localStorage.removeItem("fm2:" + rid);
  } catch(e2) {}
  // Method 3: Overwrite with expired data so listRooms filters it out
  try {
    await window.storage.set(`fm2:${rid}`, JSON.stringify({id:rid,updatedAt:0,_deleted:true}), true);
  } catch(e3) {}
}
async function listRooms() {
  try {
    const res = await window.storage.list("fm2:", true);
    if (!res?.keys?.length) return [];
    const rooms = [];
    for (const k of res.keys.slice(0, 30)) {
      try { const r = await window.storage.get(k, true); if (r) rooms.push(JSON.parse(r.value)); } catch {}
    }
    return rooms.filter(r => r && !r._deleted && r.updatedAt > 1000).sort((a,b) => (b.updatedAt||0) - (a.updatedAt||0));
  } catch { return []; }
}

function App() {
  const [screen, setScreen] = useState("welcome");
  const [player, setPlayer] = useState(null);
  const [roomId, setRoomId] = useState(null);
  const handleJoin = async id => {
    const r = await getRoom(id);
    if (r) {
      if (!r.players) r.players = {};
      if (!r.players[player.id]) {
        r.players[player.id] = {...player,joinedAt:Date.now()};
        if (!r.chat) r.chat = [];
        r.chat.push({sys:true,text:`${player.avatar.emoji} ${player.name} entrou!`,ts:Date.now()});
        await setRoom(id, r);
      }
    }
    setRoomId(id); setScreen("game");
  };
  return React.createElement("div",{className:"app"},
    React.createElement("style",null,css),
    screen==="welcome" && React.createElement(WelcomeScreen,{onNext:n=>{setPlayer({id:uid(),name:n});setScreen("avatar");}}),
    screen==="avatar" && React.createElement(AvatarSelect,{onSelect:av=>{setPlayer(p=>({...p,avatar:av}));setScreen("lobby");}}),
    screen==="lobby" && React.createElement(Lobby,{player,onJoinRoom:handleJoin}),
    screen==="game" && roomId && React.createElement(GameScreen,{roomId,player,onBack:()=>{setRoomId(null);setScreen("lobby");}}));
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
